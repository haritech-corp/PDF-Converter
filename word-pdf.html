<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title data-i18n="page.title">Word ke PDF — Meja Dokumen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="watermark" aria-hidden="true"><span>haritech</span></div>

<div class="container">

<header class="site-header">
  <a href="index.html" class="back-link">&larr; <span data-i18n="site.title">Meja Dokumen</span></a>
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="id" onclick="setLang('id')">ID</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="page-title">
  <h1 data-i18n="tool.title">Word &rarr; PDF</h1>
  <p data-i18n="tool.desc">Ubah .docx ke PDF.</p>
</div>

<div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Pilih berkas Word">
  <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <div class="dz-title" data-i18n="dropzone.text">Seret berkas atau klik untuk memilih</div>
  <div class="dz-sub" data-i18n="dropzone.sub">Format .docx</div>
  <input type="file" id="file-input" accept=".docx" multiple>
</div>

<ul class="file-list" id="file-list"></ul>

<div class="options-row">
  <button class="btn" id="run-btn" disabled data-i18n="btn.action">Ubah ke PDF</button>
</div>

<div class="status" id="status"></div>
<div class="result" id="result"></div>

<p class="note" data-i18n="note">Catatan: hanya .docx yang didukung. Tata letak akan mendekati aslinya.</p>

</div>

<footer class="site-footer">
  <div class="container">
    <div class="footer-left">
      <p data-i18n="footer.privacy">Privasi: semua pemrosesan lokal.</p>
      <p><a href="index.html" data-i18n="footer.back">&larr; Kembali</a></p>
    </div>
    <div class="footer-right">
      <p><span class="brand-badge">haritech</span></p>
    </div>
  </div>
</footer>

<div id="word-render-surface" style="position:absolute;left:-99999px;top:0;width:794px;background:#fff;padding:40px;font-family:'Inter',sans-serif;color:#111;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const i18n = {
  id: {
    'site.title':'Meja Dokumen','page.title':'Word ke PDF — Meja Dokumen',
    'tool.title':'Word → PDF','tool.desc':'Ubah .docx ke PDF.',
    'dropzone.text':'Seret berkas atau klik untuk memilih','dropzone.sub':'Format .docx',
    'btn.action':'Ubah ke PDF',
    'note':'Catatan: hanya .docx yang didukung. Tata letak akan mendekati aslinya.',
    'footer.privacy':'Privasi: semua pemrosesan lokal.','footer.back':'← Kembali',
    'status.progress':'Mengubah {0} ({1}/{2})...','status.done':'Selesai.',
    'btn.up':'Naik','btn.down':'Turun','btn.remove':'Hapus',
    'stamp.label':'SELESAI','zip.label':'{0} berkas dalam .zip',
    'dl.single':'Unduh {0}','dl.zip':'Unduh hasil-konversi.zip'
  },
  en: {
    'site.title':'Document Desk','page.title':'Word to PDF — Document Desk',
    'tool.title':'Word → PDF','tool.desc':'Convert .docx to PDF.',
    'dropzone.text':'Drop files or click to select','dropzone.sub':'.docx format',
    'btn.action':'Convert to PDF',
    'note':'Note: only .docx is supported. Layout will be preserved.',
    'footer.privacy':'Privacy: all processing is local.','footer.back':'← Back',
    'status.progress':'Converting {0} ({1}/{2})...','status.done':'Done.',
    'btn.up':'Up','btn.down':'Down','btn.remove':'Remove',
    'stamp.label':'DONE','zip.label':'{0} files in .zip',
    'dl.single':'Download {0}','dl.zip':'Download conversion-result.zip'
  }
};
var lang = 'id';

function t(key) {
  var str = i18n[lang] && i18n[lang][key];
  if (str === undefined) return key;
  for (var i = 1; i < arguments.length; i++) str = str.replace('{' + (i - 1) + '}', arguments[i]);
  return str;
}
function setLang(l) {
  lang = l; document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (i18n[l] && i18n[l][key] !== undefined) el.textContent = i18n[l][key];
  });
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
  });
  localStorage.setItem('lang', l);
}
(function(){ var s = localStorage.getItem('lang'); if (s && s !== 'id') setLang(s); })();

function bytesToSize(bytes) {
  if (bytes === 0) return '0 B';
  var u = ['B','KB','MB','GB'];
  var i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), u.length - 1);
  return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 2) + ' ' + u[i];
}
function downloadBlob(blob, name) {
  var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
}
function setStatus(el, text) { el.textContent = text || ''; el.classList.toggle('err', false); }
function setError(el, text) { el.textContent = text || ''; el.classList.toggle('err', true); }
function stripExt(name) { var i = name.lastIndexOf('.'); return i > 0 ? name.slice(0, i) : name; }
function fileKey(f) { return f.name + '_' + f.size + '_' + f.lastModified; }

// --- File list controller ---
var files = [], listEl = document.getElementById('file-list'), runBtn = document.getElementById('run-btn');
function renderList() {
  listEl.innerHTML = '';
  files.forEach(function(f, idx) {
    var li = document.createElement('li');
    // docx icon placeholder
    var ph = document.createElement('span'); ph.className = 'thumb-placeholder';
    ph.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
    li.appendChild(ph);
    var name = document.createElement('span'); name.className = 'fname'; name.textContent = f.name; li.appendChild(name);
    var size = document.createElement('span'); size.className = 'fsize'; size.textContent = bytesToSize(f.size); li.appendChild(size);
    var up = document.createElement('button'); up.className = 'move'; up.type = 'button'; up.innerHTML = '&uarr;'; up.disabled = idx === 0;
    up.addEventListener('click', function(){ var t = files[idx-1]; files[idx-1] = files[idx]; files[idx] = t; renderList(); });
    li.appendChild(up);
    var dn = document.createElement('button'); dn.className = 'move'; dn.type = 'button'; dn.innerHTML = '&darr;'; dn.disabled = idx === files.length - 1;
    dn.addEventListener('click', function(){ var t = files[idx+1]; files[idx+1] = files[idx]; files[idx] = t; renderList(); });
    li.appendChild(dn);
    var rm = document.createElement('button'); rm.type = 'button'; rm.innerHTML = '&times;';
    rm.addEventListener('click', function(){ files.splice(idx, 1); renderList(); });
    li.appendChild(rm);
    listEl.appendChild(li);
  });
  runBtn.disabled = files.length < 1;
}

var dropEl = document.getElementById('dropzone'), inputEl = document.getElementById('file-input');
dropEl.addEventListener('click', function(){ inputEl.click(); });
dropEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); inputEl.click(); } });
inputEl.addEventListener('change', function() { addFiles(inputEl.files); inputEl.value = ''; });
['dragenter','dragover'].forEach(function(ev) { dropEl.addEventListener(ev, function(e) { e.preventDefault(); e.stopPropagation(); dropEl.classList.add('dragover'); }); });
['dragleave','drop'].forEach(function(ev) { dropEl.addEventListener(ev, function(e) { e.preventDefault(); e.stopPropagation(); dropEl.classList.remove('dragover'); }); });
dropEl.addEventListener('drop', function(e) { var dt = e.dataTransfer; if (dt && dt.files && dt.files.length) addFiles(dt.files); });

function addFiles(fl) {
  var seen = {}; files.forEach(function(f){ seen[fileKey(f)] = true; });
  Array.prototype.forEach.call(fl, function(f) { if (!seen[fileKey(f)]) { files.push(f); seen[fileKey(f)] = true; } });
  renderList();
}

// --- Word conversion ---
var statusEl = document.getElementById('status'), resultEl = document.getElementById('result');
var surface = document.getElementById('word-render-surface');

function renderSurfaceToPdfBlob() {
  return new Promise(function(resolve, reject) {
    // Move surface into viewport for html2canvas to capture it
    surface.style.position = 'fixed';
    surface.style.left = '0';
    surface.style.top = '0';
    surface.style.zIndex = '9999';

    var doc = new jspdf.jsPDF('p', 'pt', 'a4');
    doc.html(surface, {
      x: 20, y: 20, width: 555, windowWidth: 794,
      html2canvas: { scale: 1.5, useCORS: true },
      callback: function(finishedDoc) {
        // Move surface back off-screen
        surface.style.position = 'absolute';
        surface.style.left = '-99999px';
        surface.style.top = '0';
        surface.style.zIndex = '';
        resolve(finishedDoc.output('blob'));
      }
    });
  });
}

async function convertOne(file) {
  var buf = await file.arrayBuffer();
  var result = await mammoth.convertToHtml({ arrayBuffer: buf });
  surface.innerHTML = "<div style='font-size:14px;line-height:1.5;'>" + result.value + "</div>";
  var blob = await renderSurfaceToPdfBlob();
  surface.innerHTML = '';
  return blob;
}

runBtn.addEventListener('click', async function() {
  var fl = files.slice(); if (!fl.length) return;
  runBtn.disabled = true; resultEl.innerHTML = '';
  try {
    var outputs = [];
    for (var i = 0; i < fl.length; i++) {
      setStatus(statusEl, t('status.progress', fl[i].name, i + 1, fl.length));
      var blob = await convertOne(fl[i]);
      outputs.push({ name: stripExt(fl[i].name) + '.pdf', blob: blob });
    }
    setStatus(statusEl, t('status.done'));
    var s = document.createElement('div'); s.className = 'stamp';
    s.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ' + t('stamp.label');
    resultEl.appendChild(s);
    if (outputs.length === 1) {
      var a = document.createElement('a'); a.className = 'dl-link'; a.href = '#';
      a.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ' + t('dl.single', outputs[0].name);
      a.addEventListener('click', function(e){ e.preventDefault(); downloadBlob(outputs[0].blob, outputs[0].name); });
      resultEl.appendChild(a);
    } else {
      var zip = new JSZip(); outputs.forEach(function(o){ zip.file(o.name, o.blob); }); var zipBlob = await zip.generateAsync({ type: 'blob' });
      var a = document.createElement('a'); a.className = 'dl-link'; a.href = '#';
      a.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ' + t('dl.zip');
      a.addEventListener('click', function(e){ e.preventDefault(); downloadBlob(zipBlob, 'hasil-konversi.zip'); });
      resultEl.appendChild(a);
      var n = document.createElement('span'); n.className = 'size-note'; n.textContent = t('zip.label', outputs.length); resultEl.appendChild(n);
    }
  } catch (err) { console.error(err); setError(statusEl, err.message); }
  finally { runBtn.disabled = false; }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
